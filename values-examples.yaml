# ============================================
# HammerDB Scale Test - Configuration Examples
# ============================================
# This file contains example configurations for various testing scenarios.
# Copy the relevant section to your values.yaml and customize as needed.

# ============================================
# EXAMPLE 1: Single Target TPC-C Test
# ============================================
# Simple configuration for testing one SQL Server with TPC-C
---
testRun:
  id: "tpcc-single-test"
  phase: "load"
  benchmark: "tprocc"

targets:
  - name: sql-server-01
    type: mssql
    host: "sqlserver.example.com"
    username: sa
    password: "YourPassword"
    tprocc:
      databaseName: tpcc

hammerdb:
  connection:
    tcp: true
    port: 1433
    encrypt_connection: true
    trust_server_cert: true

  tprocc:
    warehouses: 1000
    build_num_vu: 32
    load_num_vu: 200
    driver: timed
    rampup: 2          # 2 minutes
    duration: 10       # 10 minutes
    total_iterations: 10000000
    allwarehouse: true

global:
  image:
    repository: sillidata/hammerdb-scale
    tag: latest
  resources:
    requests:
      memory: "8Gi"
      cpu: "8"

pureStorage:
  enabled: false

