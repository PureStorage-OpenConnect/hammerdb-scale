# ============================================
# EXAMPLE 3: TPC-H Analytics Test
# ============================================
# Configuration for TPC-H analytical workload testing
---
testRun:
  id: "tpch-test"
  phase: "load"
  benchmark: "tproch"

targets:
  - name: sql-analytics-01
    type: mssql
    host: "sql-analytics.example.com"
    username: sa
    password: "YourPassword"
    tproch:
      databaseName: tpch

hammerdb:
  connection:
    tcp: true
    port: 1433
    encrypt_connection: true
    trust_server_cert: true

  tproch:
    scaleFactor: 100        # 100GB database size
    buildThreads: 8
    virtualUsers: 4
    totalQuerysets: 1
    maxdop: 8
    useClusteredColumnstore: false

global:
  resources:
    requests:
      memory: "16Gi"
      cpu: "16"
    limits:
      memory: "32Gi"
      cpu: "16"

# ============================================
# EXAMPLE 4: TPC-C with Pure Storage Metrics
# ============================================
# Configuration with Pure Storage FlashArray performance monitoring
---
testRun:
  id: "tpcc-with-storage-metrics"
  phase: "load"
  benchmark: "tprocc"

targets:
  - name: sql-bench-01
    type: mssql
    host: "sql-bench-01.example.com"
    username: sa
    password: "Password123"
    tprocc:
      databaseName: tpcc

  - name: sql-bench-02
    type: mssql
    host: "sql-bench-02.example.com"
    username: sa
    password: "Password123"
    tprocc:
      databaseName: tpcc

hammerdb:
  tprocc:
    warehouses: 1000
    build_num_vu: 32
    load_num_vu: 200
    driver: timed
    rampup: 2          # 2 minutes
    duration: 10       # 10 minutes
    allwarehouse: true

# Pure Storage metrics collection
pureStorage:
  enabled: true
  host: "192.168.1.100"
  apiToken: "your-api-token-here"
  pollInterval: 5
  verifySSL: false
  apiVersion: "2.4"

  # Note: Only the FIRST target (sql-bench-01) will collect metrics
  # This prevents API overload when testing multiple targets

# ============================================
# EXAMPLE 5: High-Scale Performance Test
# ============================================
# Configuration for maximum performance testing
---
testRun:
  id: "tpcc-high-scale"
  phase: "load"
  benchmark: "tprocc"

targets:
  - name: sql-perf-01
    type: mssql
    host: "sql-perf-01.example.com"
    username: sa
    password: "Password123"
    tprocc:
      databaseName: tpcc

hammerdb:
  connection:
    tcp: true
    port: 1433
    encrypt_connection: true
    trust_server_cert: true

  tprocc:
    warehouses: 10000      # Large warehouse count
    build_num_vu: 64       # More virtual users for build
    load_num_vu: 400       # High concurrent users for load
    use_bcp: true
    driver: timed
    rampup: 5              # 5 minutes
    duration: 60           # 60 minutes
    total_iterations: 100000000
    allwarehouse: true
    checkpoint: true

global:
  image:
    repository: sillidata/hammerdb-scale
    tag: latest
    pullPolicy: Always

  resources:
    requests:
      memory: "16Gi"
      cpu: "16"
    limits:
      memory: "32Gi"
      cpu: "32"

pureStorage:
  enabled: true
  host: "192.168.1.100"
  apiToken: "your-api-token-here"
  pollInterval: 5

# ============================================
# EXAMPLE 6: Build Phase Configuration
# ============================================
# Configuration for building TPC-C schema and loading data
---
testRun:
  id: "tpcc-build"
  phase: "build"        # Build phase, not load
  benchmark: "tprocc"

targets:
  - name: sql-bench-01
    type: mssql
    host: "sql-bench-01.example.com"
    username: sa
    password: "Password123"
    tprocc:
      databaseName: tpcc

hammerdb:
  tprocc:
    warehouses: 1000
    build_num_vu: 32    # Virtual users for schema build
    use_bcp: true       # Use BCP for faster data loading

global:
  resources:
    requests:
      memory: "8Gi"
      cpu: "8"

# Pure Storage disabled for build phase (optional)
pureStorage:
  enabled: false

# ============================================
# EXAMPLE 7: Quick Test Configuration
# ============================================
# Minimal configuration for quick validation tests
---
testRun:
  id: "quick-test"
  phase: "load"
  benchmark: "tprocc"

targets:
  - name: sql-test
    type: mssql
    host: "sqlserver.local"
    username: sa
    password: "TestPassword"
    tprocc:
      databaseName: tpcc_test

hammerdb:
  tprocc:
    warehouses: 10         # Small warehouse count
    build_num_vu: 4
    load_num_vu: 10        # Minimal concurrent users
    driver: timed
    rampup: 1              # 1 minute
    duration: 2            # 2 minutes
    allwarehouse: true

global:
  resources:
    requests:
      memory: "4Gi"
      cpu: "4"

pureStorage:
  enabled: false

# ============================================
# EXAMPLE 8: Azure SQL Database Configuration
# ============================================
# Configuration for testing Azure SQL Database
---
testRun:
  id: "azure-sql-test"
  phase: "load"
  benchmark: "tprocc"

targets:
  - name: azure-sql-01
    type: mssql
    host: "myserver.database.windows.net"
    username: sqladmin
    password: "AzurePassword123!"
    tprocc:
      databaseName: tpcc

hammerdb:
  connection:
    tcp: true
    port: 1433
    azure: true           # Azure SQL specific settings
    authentication: sql
    encrypt_connection: true
    trust_server_cert: false  # Azure uses valid certs

  tprocc:
    warehouses: 1000
    build_num_vu: 32
    load_num_vu: 200
    driver: timed
    rampup: 2
    duration: 10

# ============================================
# USAGE NOTES
# ============================================
#
# 1. Copy the relevant example to values.yaml
# 2. Update credentials, hostnames, and IPs
# 3. Adjust resources based on your cluster capacity
# 4. For Pure Storage metrics, get API token from FlashArray
# 5. Test with small configurations first, then scale up
#
# Deployment:
#   ./deploy-test.sh -p load -t my-test -b tprocc -n hammerdb-scale
#
# Aggregate Results:
#   ./aggregate-results.sh -p load -t my-test -n hammerdb-scale
#
