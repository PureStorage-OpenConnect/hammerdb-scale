{{- $hasOracle := false -}}
{{- range .Values.targets -}}
  {{- if eq .type "oracle" -}}
    {{- $hasOracle = true -}}
  {{- end -}}
{{- end -}}
{{- if $hasOracle }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hammerdb-scale-test.fullname" . }}-scripts-oracle
  labels:
    {{- include "hammerdb-scale-test.labels" . | nindent 4 }}
    hammerdb.io/database-type: oracle
data:
  # HammerDB TCL scripts
  {{- range $path, $_ := .Files.Glob "scripts/oracle/*.tcl" }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
  {{- end }}

  # Pure Storage metrics collector
  {{- if .Values.pureStorage.enabled }}
  collect_pure_metrics.py: |-
{{ .Files.Get "scripts/collect_pure_metrics.py" | indent 4 }}
  {{- end }}
{{- end }}
