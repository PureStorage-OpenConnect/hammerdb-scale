# HammerDB-Scale — Oracle TPC-H Example
name: oracle-tproch
description: "Oracle TPC-H benchmark across 4 targets"
default_benchmark: tproch

targets:
  defaults:
    type: oracle
    username: system
    password: "YourPassword"
    image:
      repository: sillidata/hammerdb-scale-oracle
      tag: latest
      pull_policy: Always
    oracle:
      service: "ORCLPDB"
      port: 1521
      tablespace: "TPCC"
      temp_tablespace: "TEMP"
      tprocc:
        user: "TPCC"
        password: "YourSchemaPassword"
      tproch:
        user: "tpch"
        password: "YourSchemaPassword"
        degree_of_parallel: 8

  hosts:
    - name: ora-01
      host: "oracle-01.example.com"
    - name: ora-02
      host: "oracle-02.example.com"
    - name: ora-03
      host: "oracle-03.example.com"
    - name: ora-04
      host: "oracle-04.example.com"

hammerdb:
  tproch:
    scale_factor: 10
    build_threads: 8
    build_virtual_users: 8
    load_virtual_users: 8
    total_querysets: 1

resources:
  requests:
    memory: "4Gi"
    cpu: "4"
  limits:
    memory: "8Gi"
    cpu: "8"

kubernetes:
  namespace: hammerdb
  job_ttl: 86400

storage_metrics:
  enabled: false
