# HammerDB-Scale — SQL Server TPC-H Example
name: mssql-tproch
description: "SQL Server TPC-H benchmark across 4 targets"
default_benchmark: tproch

targets:
  defaults:
    type: mssql
    username: sa
    password: "YourPassword"
    image:
      repository: sillidata/hammerdb-scale-mssql
      tag: latest
      pull_policy: Always
    mssql:
      port: 1433
      connection:
        tcp: true
        authentication: sql
        odbc_driver: "ODBC Driver 18 for SQL Server"
        encrypt_connection: true
        trust_server_cert: true
      tprocc:
        database_name: tpcc
      tproch:
        database_name: tpch
        maxdop: 2
        use_clustered_columnstore: false

  hosts:
    - name: sql-01
      host: "sql-01.example.com"
    - name: sql-02
      host: "sql-02.example.com"
    - name: sql-03
      host: "sql-03.example.com"
    - name: sql-04
      host: "sql-04.example.com"

hammerdb:
  tproch:
    scale_factor: 10
    build_threads: 8
    build_virtual_users: 8
    load_virtual_users: 8
    total_querysets: 1

resources:
  requests:
    memory: "4Gi"
    cpu: "4"
  limits:
    memory: "8Gi"
    cpu: "8"

kubernetes:
  namespace: hammerdb
  job_ttl: 86400

storage_metrics:
  enabled: false
